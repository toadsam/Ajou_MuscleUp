# Copy this file to application-local.properties (kept out of Git) and fill values.

# OpenAI API configuration (set via environment variable recommended)
# openai.api.key=
# openai.api.base=https://api.openai.com

# Google OAuth (local example)
# google.client-id=your-local-google-client-id
# google.client-secret=your-local-google-client-secret

# Optional: bootstrap one existing account to ROLE_ADMIN on app startup.
# app.admin.bootstrap-email=your-admin-email@example.com

# Activate with: -Dspring.profiles.active=local
