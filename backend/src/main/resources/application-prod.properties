server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}}
spring.datasource.username=${DB_USERNAME:${PGUSER}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8

openai.api.key=${OPENAI_API_KEY:}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://muscle-up.click,https://www.muscle-up.click}
app.frontend-base-url=${FRONTEND_BASE_URL:https://muscle-up.click}

# Google OAuth (prod) - provide via env vars in deployment
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

# upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

## JWT
jwt.secret=${JWT_SECRET:change-me-32-bytes-minimum-change-me-32-bytes}
jwt.default.expiration-ms=3600000
jwt.access.expiration-ms=900000
jwt.refresh.expiration-ms=1209600000

# S3 storage
app.s3.enabled=${S3_ENABLED:false}
app.s3.bucket=${S3_BUCKET:}
app.s3.region=${AWS_REGION:ap-northeast-2}
app.s3.prefix=${S3_PREFIX:uploads}
app.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
